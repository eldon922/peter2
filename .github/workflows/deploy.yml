name: Build & Deploy WaCRM

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: eldon922/wacrm-image
  CONTAINER_NAME: wacrm-container

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env file for build
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            docker run -d \
              --memory="3G" \
              --memory-reservation="3G" \
              --cpus="0.8" \
              --restart=always \
              --env-file ~/.wacrm-env \
              --network="host" \
              --name ${{ env.CONTAINER_NAME }} \
              ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            sleep 5

            echo "✅ Deployed ${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
            docker logs --tail 50 ${{ env.CONTAINER_NAME }}
